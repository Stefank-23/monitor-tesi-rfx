name: Monitor Tesi RFX
on:
  schedule:
    - cron: '0 8,18 * * *' # Gira alle 8:00 e alle 18:00
  workflow_dispatch: # Permette l'avvio manuale

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Risolve l'avviso di deprecazione
    steps:
      - name: Checkout codice
        uses: actions/checkout@v4 # Versione aggiornata
      - name: Setup Python
        uses: actions/setup-python@v5 # Versione aggiornata
        with:
          python-version: '3.11'
      - name: Installa dipendenze
        run: pip install -r requirements.txt
      - name: Esegui script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py
      - name: Salva modifiche
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add tesi_viste.txt
          git commit -m "Aggiornato registro tesi" || exit 0
          git push
